services:

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: llama3.2:latest
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy          # waits until ollama serve is up
      ollama-pull:
        condition: service_completed_successfully  # waits until models are pulled
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agentic_workflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── ChromaDB ──────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:1.0.12
    ports:
      - "8001:8000"
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS_FILE: ""
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Ollama ────────────────────────────────────────────────────────────────────
  # Default entrypoint (ollama serve). Healthcheck only verifies the server
  # is accepting connections — model presence is guaranteed by ollama-pull
  # completing successfully before the backend starts.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "1"
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 12G
        reservations:
          cpus: "4.0"
          memory: 6G
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # Pulls required models into the shared ollama_data volume.
  # Exits 0 on success so backend's service_completed_successfully gate works.
  # restart: on-failure retries on transient network errors; once models are
  # cached in ollama_data the pull is a fast no-op on subsequent stack starts.
  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3.2:latest && ollama pull nomic-embed-text"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  frontend_nm:
